services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-certifactory}
      POSTGRES_USER: ${POSTGRES_USER:-certifactory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certifactory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-certifactory}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-certifactory}
      PKI_MASTER_KEY: ${PKI_MASTER_KEY:?Set PKI_MASTER_KEY in .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      CORS_ORIGINS: '["https://localhost","http://localhost"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend

  proxy:
    build: ./proxy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/etc/nginx/certs/cert.pem}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/etc/nginx/certs/key.pem}
    volumes:
      - ${SSL_CERT_DIR:-certs}:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  certs:
